- name: Crear carpeta del servicio
  file:
    path: "{{ nebula_base_path }}/authelia/config"
    state: directory
    recurse: true
  become: true

- name: Generar configuration.yml
  template:
    src: configuration.yml.j2
    dest: "{{ nebula_base_path }}/authelia/config/configuration.yml"
  become: true

- name: Generar users_database.yml
  template:
    src: users_database.yml.j2
    dest: "{{ nebula_base_path }}/authelia/config/users_database.yml"
  become: true

- name: Generar docker-compose.yml
  template:
    src: docker-compose.yml.j2
    dest: "{{ nebula_base_path }}/authelia/docker-compose.yml"
  become: true

- name: Levantar el servicio
  community.docker.docker_compose_v2:
    project_src: "{{ nebula_base_path }}/authelia"
    state: present
  become: true