- name: Crear carpeta del servicio
  file:
    path: "{{ nebula_base_path }}/{{ service_name }}"
    state: directory
    recurse: true
    owner: "1000"
    group: "1000"
  become: true

- name: Generar docker-compose.yml desde la plantilla del servicio
  template:
    src: "{{ playbook_dir }}/services/{{ service_name }}/docker-compose.yml.j2"
    dest: "{{ nebula_base_path }}/{{ service_name }}/docker-compose.yml"
  become: true

- name: Levantar el servicio
  community.docker.docker_compose_v2:
    project_src: "{{ nebula_base_path }}/{{ service_name }}"
    state: present
  become: true