- hosts: nebula
  become: true 
  vars:
    service_uids:
      postgres: '999'
      pgadmin: '5050'
      default: '1000'
  roles:
    - { role: base, tags: ['base'] }
    - { role: mail, tags: ['mail'] } 
    - { role: authelia, tags: ['authelia']}
  tasks:
    # --- INICIO BLOQUE OLLAMA BARE METAL ---
    - name: Comprobar si Ollama ya está instalado
      command: which ollama
      register: ollama_check
      ignore_errors: true
      changed_when: false

    - name: Descargar e instalar Ollama en el host
      shell: curl -fsSL https://ollama.com/install.sh | sh
      when: ollama_check.rc != 0

    - name: Crear directorio de configuración (override) para systemd
      file:
        path: /etc/systemd/system/ollama.service.d
        state: directory
        mode: '0755'

    - name: Configurar Ollama para escuchar en todas las interfaces (0.0.0.0)
      copy:
        dest: /etc/systemd/system/ollama.service.d/override.conf
        content: |
          [Service]
          Environment="OLLAMA_HOST=0.0.0.0"
        mode: '0644'
      register: ollama_config

    - name: Recargar systemd y reiniciar Ollama si hubo cambios
      systemd:
        daemon_reload: yes
        name: ollama
        state: restarted
        enabled: yes
      when: ollama_config.changed or ollama_check.rc != 0

    - name: Asegurar que el servicio Ollama está iniciado
      systemd:
        name: ollama
        state: started
        enabled: yes

    - name: Esperar a que la API de Ollama esté disponible
      uri:
        url: http://127.0.0.1:11434/
        status_code: 200
      register: _result
      until: _result.status == 200
      retries: 5
      delay: 5

    - name: Obtener lista de modelos descargados
      command: ollama list
      register: ollama_models
      changed_when: false

    - name: Comprobar si el modelo final (hecate) ya existe
      shell: ollama list | grep -q "^hecate "
      register: check_target
      failed_when: false
      changed_when: false

    - name: Comprobar si el modelo fuente existe (solo si falta el final)
      shell: ollama list | grep -q "^technomantuscorvi/hecate "
      register: check_source
      failed_when: false
      changed_when: false
      when: check_target.rc != 0

    - name: Transmutar a Hecate (copiar modelo)
      command: ollama cp technomantuscorvi/hecate hecate
      when: check_target.rc != 0 and check_source.rc == 0

    - name: Purgar el cascarón original
      command: ollama rm technomantuscorvi/hecate
      when: check_target.rc != 0 and check_source.rc == 0

    - name: Otorgar permisos de escritura al contenedor sobre los archivos subidos
      file:
        path: "{{ nebula_base_path }}/librechat/uploads"
        state: directory
        owner: "1000"
        group: "1000"
        recurse: yes

    - name: Instalar dependencia psycopg2 para los módulos de PostgreSQL de Ansible
      apt:
        name: python3-psycopg2
        state: present
        update_cache: true
      become: true

    - name: Instalar cliente psql para poder verificar/administrar Postgres desde el host
      apt:
        name: postgresql-client
        state: present
      become: true

    - name: Crear carpeta base de servicios
      file:
        path: "{{ nebula_base_path }}"
        state: directory
      become: true

    - name: Crear la red docker compartida "proxy"
      community.docker.docker_network:
        name: proxy
        state: present
      become: true

    # --- FIN BLOQUE OLLAMA BARE METAL ---
    
    - name: Generar archivo de configuración librechat.yaml desde plantilla
      template:
        src: "{{ playbook_dir }}/services/librechat/librechat.yaml.j2"
        dest: "{{ nebula_base_path }}/librechat/librechat.yaml"
        mode: '0644'
    
    - name: Desplegar servicios estándar (rol genérico)
      include_role:
        name: compose_service
      vars:
        service_name: "{{ item }}"
        service_owner_uid: "{{ service_uids[item] | default(service_uids['default']) }}"
      loop: "{{ servicios_compose }}"

    - name: Crear el bucket "backups" en MinIO (idempotente)
      command: >
        docker run --rm --network proxy --entrypoint sh minio/mc
        -c "mc alias set local http://minio:9000 admin {{ minio_root_password }} && mc mb --ignore-existing local/backups"
      register: minio_bucket_result
      changed_when: "'Bucket created successfully' in minio_bucket_result.stdout"
      when: "'minio' in servicios_compose"
    
    - name: Desplegar configuración de Homepage (servicios)
      template:
        src: "{{ playbook_dir }}/services/homepage/services.yaml.j2"
        dest: "{{ nebula_base_path }}/homepage/config/services.yaml"
        mode: '0644'
      when: "'homepage' in servicios_compose"
      become: true

    - name: Desplegar configuración de marcadores (bookmarks) de Homepage
      template:
        src: "{{ playbook_dir }}/services/homepage/bookmarks.yaml.j2"
        dest: "{{ nebula_base_path }}/homepage/config/bookmarks.yaml"
        mode: '0644'
      when: "'homepage' in servicios_compose"
      become: true

    - name: Desplegar settings.yaml de Homepage
      template:
        src: "{{ playbook_dir }}/services/homepage/settings.yaml.j2"
        dest: "{{ nebula_base_path }}/homepage/config/settings.yaml"
        mode: '0644'
      when: "'homepage' in servicios_compose"
      become: true

    - name: Sincronizar imágenes de Homepage
      synchronize:
        src: "{{ playbook_dir }}/services/homepage/images/"
        dest: "{{ nebula_base_path }}/homepage/public/images/"
        recursive: yes
        delete: yes
      when: "'homepage' in servicios_compose"
      become: true